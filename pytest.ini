[pytest]
# Pytest configuration for coral-python

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes
    -ra

# Test paths
testpaths = tests

# Markers for categorizing tests
markers =
    integration: Integration tests that run complete workflows
    unit: Unit tests for individual components
    phiflow: Tests requiring PhiFlow module
    math: Tests requiring math module
    string: Tests requiring string module
    slow: Tests that take significant time to run

# Minimum Python version
minversion = 3.8

# Configure warnings
filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:jit_compile\(\) not supported by numpy:RuntimeWarning
    ignore:spsolve requires A be CSC or CSR matrix format:scipy.sparse._base.SparseEfficiencyWarning
    ignore:Rank deficiency >= 1 detected in linear solve:RuntimeWarning